backend:
  name: git-gateway
  branch: main

media_folder: "src/assets"
public_folder: "../assets"

collections:
  # 1. BLOG POSTS -- matches src/content/blog/ and content/config.ts schema
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description (SEO Meta)", name: "description", widget: "text"}
      - {label: "Publish Date", name: "pubDate", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string", required: false}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Featured Image", name: "image", widget: "string", required: false, hint: "Path like /images/example.jpg, or leave blank to use the default placeholder"}
      - {label: "Body", name: "body", widget: "markdown"}

  # 2. FAQs -- matches src/content/faqs/ and content/config.ts schema
  # Note: the "Answer" is the markdown body, not a separate field --
  # this matches how FAQ.astro and FAQSection.astro read faq.body
  - name: "faqs"
    label: "FAQs"
    folder: "src/content/faqs"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Question", name: "question", widget: "string"}
      - {label: "Display Order", name: "order", widget: "number", required: false, hint: "Lower numbers show first within their service area"}
      - {label: "Answer", name: "body", widget: "markdown"}
